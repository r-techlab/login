<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.login-container {
  background: #fff;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  border-radius: 16px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.2);
}
.login-container h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #333;
}
.input-box {
  margin-bottom: 20px;
}
.input-box input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  outline: none;
  font-size: 14px;
  transition: all 0.3s;
}
.input-box input:focus {
  border-color: #667eea;
}
.error-msg {
  color: #e74c3c;
  font-size: 13px;
  margin-bottom: 15px;
  text-align: center;
  display: none;
  padding: 8px;
  background: #fee;
  border-radius: 6px;
}
.success-msg {
  color: #27ae60;
  font-size: 13px;
  margin-bottom: 15px;
  text-align: center;
  display: none;
  padding: 8px;
  background: #d5f4e6;
  border-radius: 6px;
}
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  color: white;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s;
}
button:hover:not(:disabled) {
  transform: translateY(-2px);
}
button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #fff;
  border-radius: 50%;
  border-top-color: transparent;
  animation: spin 0.6s linear infinite;
  margin-right: 8px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="login-container">
  <h2>🔐 Login</h2>
  <form id="loginForm">
    <div class="input-box">
      <input type="text" id="username" placeholder="Username" autocomplete="off">
    </div>
    <div class="input-box">
      <input type="password" id="password" placeholder="Password">
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <button type="submit" id="loginBtn">Login</button>
  </form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDMJro8x1k1DvebniCuCDHeev7TlVDSR8av_X5OJlqZH_QPYI6Ubg5QeFG2bslLe4/exec";

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const loginBtn = document.getElementById('loginBtn');
  const originalBtnText = loginBtn.innerHTML;
  
  // Reset messages
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';
  
  // Validate inputs
  if (!username || !password) {
    errorMsg.textContent = '⚠️ Please enter both username and password';
    errorMsg.style.display = 'block';
    return;
  }
  
  // Show loading state
  loginBtn.innerHTML = '<span class="loading"></span> Logging in...';
  loginBtn.disabled = true;
  
  try {
    // Make the request to Google Apps Script
    const response = await fetch(`${SCRIPT_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
    
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    const data = await response.json();
    
    if (data.status === "success") {
      successMsg.textContent = '✅ Login successful! Redirecting...';
      successMsg.style.display = 'block';
      setTimeout(() => {
        window.location.href = "home.html";
      }, 1500);
    } else {
      errorMsg.textContent = data.message || '❌ Invalid username or password';
      errorMsg.style.display = 'block';
      loginBtn.innerHTML = originalBtnText;
      loginBtn.disabled = false;
    }
  } catch (error) {
    console.error('Login error:', error);
    errorMsg.textContent = '⚠️ Connection error. Please check your internet and try again.';
    errorMsg.style.display = 'block';
    loginBtn.innerHTML = originalBtnText;
    loginBtn.disabled = false;
  }
});
</script>
</body>
</html>
