<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.login-container {
  background: #fff;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  border-radius: 16px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.2);
}
.login-container h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #333;
}
.input-box {
  margin-bottom: 20px;
}
.input-box input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  outline: none;
  font-size: 14px;
  transition: all 0.3s;
}
.input-box input:focus {
  border-color: #667eea;
}
.error-msg {
  color: #e74c3c;
  font-size: 13px;
  margin-bottom: 15px;
  text-align: center;
  display: none;
  padding: 8px;
  background: #fee;
  border-radius: 6px;
}
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  color: white;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s;
}
button:hover:not(:disabled) {
  transform: translateY(-2px);
}
button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #fff;
  border-radius: 50%;
  border-top-color: transparent;
  animation: spin 0.6s linear infinite;
  margin-right: 8px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="login-container">
  <h2>🔐 Login</h2>
  <form id="loginForm">
    <div class="input-box">
      <input type="text" id="username" placeholder="Username" autocomplete="off">
    </div>
    <div class="input-box">
      <input type="password" id="password" placeholder="Password">
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <button type="submit" id="loginBtn">Login</button>
  </form>
</div>

<script>
// ✅ CORRECT URL (no /u/1/ path)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuHgoMmRY9ZM1seWMnEB_3RPpvfueMEo2mRIVBKsWIaDLVvz0eKDLUn4hz6go4h14/exec";

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');
  const originalBtnText = loginBtn.innerHTML;
  
  // Reset error
  errorMsg.style.display = 'none';
  
  // Validate inputs
  if (!username || !password) {
    errorMsg.textContent = '⚠️ Please enter both username and password';
    errorMsg.style.display = 'block';
    return;
  }
  
  // Show loading state
  loginBtn.innerHTML = '<span class="loading"></span> Logging in...';
  loginBtn.disabled = true;
  
  // Generate unique callback name
  const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
  
  // Create timeout (10 seconds)
  const timeout = setTimeout(function() {
    if (window[callbackName]) {
      window[callbackName] = function() {}; // No-op to avoid errors
      delete window[callbackName];
      if (document.getElementById('jsonp_script')) {
        document.getElementById('jsonp_script').remove();
      }
      loginBtn.innerHTML = originalBtnText;
      loginBtn.disabled = false;
      errorMsg.textContent = '⏱️ Request timed out. Please try again.';
      errorMsg.style.display = 'block';
    }
  }, 10000);
  
  // Define the callback function
  window[callbackName] = function(response) {
    // Clear timeout
    clearTimeout(timeout);
    
    // Remove script tag
    const scriptTag = document.getElementById('jsonp_script');
    if (scriptTag) scriptTag.remove();
    
    // Clean up callback
    delete window[callbackName];
    
    // Process response
    console.log('Response received:', response);
    
    if (response && response.status === "success") {
      // Login successful
      errorMsg.style.display = 'none';
      loginBtn.innerHTML = '✅ Success! Redirecting...';
      setTimeout(function() {
        window.location.href = "home.html";
      }, 1000);
    } else {
      // Login failed
      loginBtn.innerHTML = originalBtnText;
      loginBtn.disabled = false;
      const message = (response && response.message) ? response.message : '❌ Invalid username or password';
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }
  };
  
  // Create and append JSONP script
  const script = document.createElement('script');
  script.id = 'jsonp_script';
  script.src = SCRIPT_URL + '?username=' + encodeURIComponent(username) + 
               '&password=' + encodeURIComponent(password) + 
               '&callback=' + callbackName;
  
  script.onerror = function() {
    clearTimeout(timeout);
    if (window[callbackName]) delete window[callbackName];
    if (document.getElementById('jsonp_script')) {
      document.getElementById('jsonp_script').remove();
    }
    loginBtn.innerHTML = originalBtnText;
    loginBtn.disabled = false;
    errorMsg.textContent = '🌐 Network error. Please check your connection.';
    errorMsg.style.display = 'block';
  };
  
  document.head.appendChild(script);
});
</script>
</body>
</html>
