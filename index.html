<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Debug Version</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: Arial, sans-serif;
  padding: 20px;
}
.login-container {
  background: white;
  padding: 40px;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.2);
}
h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #333;
}
.input-group {
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 12px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
}
input:focus {
  outline: none;
  border-color: #667eea;
}
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.message {
  margin-top: 15px;
  padding: 10px;
  border-radius: 8px;
  display: none;
  font-size: 14px;
  text-align: center;
}
.error {
  background: #fee;
  color: #c33;
  border-left: 4px solid #c33;
}
.success {
  background: #efe;
  color: #3c3;
  border-left: 4px solid #3c3;
}
.info {
  background: #e3f2fd;
  color: #1976d2;
  border-left: 4px solid #1976d2;
  display: block;
  margin-bottom: 20px;
  font-size: 12px;
}
.debug {
  background: #f5f5f5;
  color: #666;
  font-family: monospace;
  font-size: 11px;
  margin-top: 20px;
  padding: 10px;
  border-radius: 8px;
  display: none;
  word-break: break-all;
}
</style>
</head>
<body>
<div class="login-container">
  <h2>🔐 Login</h2>
  
  <div class="message info" id="infoMsg">
    ⚡ Testing connection...
  </div>
  
  <div class="input-group">
    <input type="text" id="username" placeholder="Username" autocomplete="off">
  </div>
  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
  </div>
  
  <button id="loginBtn" onclick="login()">Login</button>
  
  <div class="message error" id="errorMsg"></div>
  <div class="message success" id="successMsg"></div>
  <div class="debug" id="debugMsg"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDMJro8x1k1DvebniCuCDHeev7TlVDSR8av_X5OJlqZH_QPYI6Ubg5QeFG2bslLe4/exec";

// Test the connection when page loads
window.addEventListener('load', function() {
  document.getElementById('infoMsg').innerHTML = '✅ Ready to login. Enter credentials and click Login.';
  console.log('Page loaded. Script URL:', SCRIPT_URL);
});

function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const debugMsg = document.getElementById('debugMsg');
  const loginBtn = document.getElementById('loginBtn');
  
  // Hide previous messages
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';
  debugMsg.style.display = 'none';
  
  // Validate
  if (!username || !password) {
    errorMsg.innerHTML = '❌ Please enter username and password';
    errorMsg.style.display = 'block';
    return;
  }
  
  // Show loading
  const originalText = loginBtn.textContent;
  loginBtn.textContent = 'Logging in...';
  loginBtn.disabled = true;
  
  // Generate unique callback
  const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
  
  // Setup timeout
  const timeout = setTimeout(function() {
    if (window[callbackName]) {
      delete window[callbackName];
      if (script) script.remove();
      loginBtn.textContent = originalText;
      loginBtn.disabled = false;
      errorMsg.innerHTML = '⏰ Request timeout (10 seconds). Check your internet connection.';
      errorMsg.style.display = 'block';
      debugMsg.innerHTML = 'Debug: Request took too long to respond.';
      debugMsg.style.display = 'block';
    }
  }, 10000);
  
  // Create callback function
  window[callbackName] = function(response) {
    console.log('Response received:', response);
    clearTimeout(timeout);
    
    // Show debug info
    debugMsg.innerHTML = 'Debug Info:<br>' +
      '📡 Response type: ' + typeof response + '<br>' +
      '📝 Response content: ' + JSON.stringify(response) + '<br>' +
      '🔗 URL called: ' + SCRIPT_URL + '<br>' +
      '👤 Username: ' + username;
    debugMsg.style.display = 'block';
    
    // Remove script
    if (script) script.remove();
    
    // Check response
    if (response && response.status === 'success') {
      successMsg.innerHTML = '✅ Login successful! Redirecting...';
      successMsg.style.display = 'block';
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 1500);
    } else {
      loginBtn.textContent = originalText;
      loginBtn.disabled = false;
      const msg = (response && response.message) ? response.message : '❌ Invalid username or password';
      errorMsg.innerHTML = msg;
      errorMsg.style.display = 'block';
    }
    
    // Cleanup
    delete window[callbackName];
  };
  
  // Create script tag
  const url = SCRIPT_URL + '?username=' + encodeURIComponent(username) + 
              '&password=' + encodeURIComponent(password) + 
              '&callback=' + callbackName;
  
  console.log('Request URL:', url);
  debugMsg.innerHTML = 'Debug: Sending request...<br>URL: ' + url;
  debugMsg.style.display = 'block';
  
  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() {
    clearTimeout(timeout);
    delete window[callbackName];
    script.remove();
    loginBtn.textContent = originalText;
    loginBtn.disabled = false;
    errorMsg.innerHTML = '🌐 Network error. Cannot reach the server.';
    errorMsg.style.display = 'block';
    debugMsg.innerHTML = 'Debug: Script failed to load. Check URL and CORS.';
    debugMsg.style.display = 'block';
  };
  
  document.head.appendChild(script);
}

// Allow Enter key
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    login();
  }
});
</script>
</body>
</html>
