
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: darkblue;
}

button:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.message {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}

.loading {
    color: #666;
}

.success {
    color: green;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="loginid" placeholder="Login Id">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="message" id="msg"></div>
</div>

<script src="session.js"></script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwx8ZwbsknSi87e8VMidQvyCj4SYpGpxG64PJjmrRAfobQZZSKTahdrYaFsSOQ-gC8/exec";

// Check if already logged in - but clear any corrupted sessions first
window.onload = function() {
    // Try to validate session, if it fails, clear it
    try {
        if (isSessionValid()) {
            window.location.href = 'home.html';
        }
    } catch(e) {
        // Clear corrupted session
        clearSession();
    }
};

function login() {
    let loginid = document.getElementById("loginid").value.trim();
    let password = document.getElementById("password").value.trim();
    let msgElement = document.getElementById("msg");
    let loginButton = document.querySelector("button");

    // Validation: prevent empty submission
    if (!loginid || !password) {
        msgElement.innerText = "Please enter both User ID and Password";
        msgElement.className = "message error";
        return;
    }

    // Show loading state
    msgElement.innerText = "Logging in...";
    msgElement.className = "message loading";
    loginButton.disabled = true;

    // Use JSONP approach for Google Apps Script (avoids CORS)
    const callbackName = 'handleLoginResponse_' + Date.now(); // Unique callback name
    const timeoutDuration = 10000; // 10 second timeout
    
    let timeoutId = setTimeout(function() {
        if (window[callbackName]) {
            loginButton.disabled = false;
            msgElement.innerText = "Request timeout. Please try again.";
            msgElement.className = "message error";
            delete window[callbackName];
            if (script && script.parentNode) {
                document.body.removeChild(script);
            }
        }
    }, timeoutDuration);
    
    window[callbackName] = function(data) {
        clearTimeout(timeoutId);
        loginButton.disabled = false;
        
        if (data.status === "success") {
            // Create session with userId
            createSession(data.userId);
            
            msgElement.innerText = "Login Successful! Redirecting...";
            msgElement.className = "message success";
            
            // Redirect to home page after short delay
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1000);
        } else {
            msgElement.innerText = data.message || "Invalid credentials";
            msgElement.className = "message error";
        }
        
        // Cleanup
        delete window[callbackName];
        if (script && script.parentNode) {
            document.body.removeChild(script);
        }
    };

    // Create script tag for JSONP request
    const script = document.createElement('script');
    script.src = `${API_URL}?loginid=${encodeURIComponent(loginid)}&password=${encodeURIComponent(password)}&callback=${callbackName}`;
    script.onerror = function() {
        clearTimeout(timeoutId);
        loginButton.disabled = false;
        msgElement.innerText = "Connection error. Check your internet or Apps Script deployment.";
        msgElement.className = "message error";
        delete window[callbackName];
        if (script && script.parentNode) {
            document.body.removeChild(script);
        }
    };
    document.body.appendChild(script);
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            login();
        }
    });
});
</script>

</body>
</html>
