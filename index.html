
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R-TechLab - Login</title>

<style>
.company-name-header {
    font-size: 24px;
    font-weight: bold;
    color: white;
    text-align: center;
    margin-bottom: 15px;
    padding: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 8px;
}

body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: darkblue;
}

button:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.message {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}

.loading {
    color: #666;
}

.success {
    color: green;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="login-box">
    <div class="company-name-header">R-TechLab</div>
    <h2>Login</h2>

    <input type="text" id="loginid" placeholder="Login Id">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="message" id="msg"></div>
</div>

<script src="api.js"></script>
<script src="session.js"></script>
<script>
// Check if already logged in
window.onload = function() {
    if (hasLocalSession()) {
        window.location.href = 'home.html';
    }
};

function login() {
    let loginid = document.getElementById("loginid").value.trim();
    let password = document.getElementById("password").value.trim();
    let msgElement = document.getElementById("msg");
    let loginButton = document.querySelector("button");

    // Validation: prevent empty submission
    if (!loginid || !password) {
        msgElement.innerText = "Please enter both User ID and Password";
        msgElement.className = "message error";
        return;
    }

    // Show loading state
    msgElement.innerText = "Logging in...";
    msgElement.className = "message loading";
    loginButton.disabled = true;

    // Use the secure API function
    apiLogin(loginid, password, function(data) {
        loginButton.disabled = false;
        
        if (data.status === "success") {
            // Create session with server-generated sessionId
            createSession(data);
            
            msgElement.innerText = "Login Successful! Redirecting...";
            msgElement.className = "message success";
            
            // Redirect to home page after short delay
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1000);
        } else {
            msgElement.innerText = data.message || "Invalid credentials";
            msgElement.className = "message error";
        }
    });
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            login();
        }
    });
});
</script>

</body>
</html>
