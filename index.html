<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
}
.login-container {
  background: #fff;
  padding: 30px;
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.login-container h2 {
  text-align: center;
  margin-bottom: 20px;
}
.input-box {
  margin-bottom: 15px;
}
.input-box input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  outline: none;
}
.input-box input:focus {
  border-color: #2575fc;
}
.error-msg {
  color: red;
  font-size: 13px;
  margin-bottom: 12px;
  text-align: center;
  display: none;
}
button {
  width: 100%;
  padding: 12px;
  background: #2575fc;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}
button:hover {
  background: #1a5edb;
}
button:disabled {
  background: #90b8fc;
  cursor: not-allowed;
}
@media (max-width: 400px) {
  .login-container {
    margin: 20px;
  }
}
</style>
</head>
<body>
<div class="login-container">
  <h2>Login</h2>
  <form>
    <div class="input-box">
      <input id="username" type="text" placeholder="Username">
    </div>
    <div class="input-box">
      <input id="password" type="password" placeholder="Password">
    </div>
    <p class="error-msg" id="error-msg"></p>
    <button type="button" id="login-btn" onclick="loginUser()">Login</button>
  </form>
</div>

<script>
  
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDMJro8x1k1DvebniCuCDHeev7TlVDSR8av_X5OJlqZH_QPYI6Ubg5QeFG2bslLe4/exec";
  
  function loginUser() {
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value.trim();
    var errorMsg = document.getElementById("error-msg");
    var btn = document.getElementById("login-btn");

    // Hide previous error
    errorMsg.style.display = "none";

    // Validate empty fields
    if (!username || !password) {
      errorMsg.textContent = "Please enter username and password";
      errorMsg.style.display = "block";
      return;
    }

    // Show loading state
    btn.textContent = "Logging in...";
    btn.disabled = true;

    // Use JSONP to avoid CORS
    var callbackName = "jsonpCallback_" + Date.now();
    var script = document.createElement("script");

    // Define the callback function
    window[callbackName] = function(data) {
      clearTimeout(timeout);
      document.body.removeChild(script);
      delete window[callbackName];
      btn.textContent = "Login";
      btn.disabled = false;

      if (data.status === "success") {
        alert("Login successful!");
        window.location.href = "home.html";
      } else if (data.status === "error") {
        errorMsg.textContent = data.message;
        errorMsg.style.display = "block";
      } else {
        errorMsg.textContent = "Invalid username or password";
        errorMsg.style.display = "block";
      }
    };

    // Timeout in case script never loads
    var timeout = setTimeout(function() {
      if (window[callbackName]) {
        document.body.removeChild(script);
        delete window[callbackName];
        btn.textContent = "Login";
        btn.disabled = false;
        errorMsg.textContent = "Request timed out. Please try again.";
        errorMsg.style.display = "block";
      }
    }, 10000);

    script.src = SCRIPT_URL
      + "?username=" + encodeURIComponent(username)
      + "&password=" + encodeURIComponent(password)
      + "&callback=" + callbackName;

    script.onerror = function() {
      clearTimeout(timeout);
      document.body.removeChild(script);
      delete window[callbackName];
      btn.textContent = "Login";
      btn.disabled = false;
      errorMsg.textContent = "Something went wrong. Please try again.";
      errorMsg.style.display = "block";
    };

    document.body.appendChild(script);
  }

  // Allow pressing Enter to submit
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") loginUser();
  });
</script>
</body>
</html>
