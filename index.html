<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
}

.login-container {
  background: #fff;
  padding: 30px;
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-container h2 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  outline: none;
}

.input-box input:focus {
  border-color: #2575fc;
}

button {
  width: 100%;
  padding: 12px;
  background: #2575fc;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1a5edb;
}

@media (max-width: 400px) {
  .login-container {
    margin: 20px;
  }
}
</style>
</head>
<body>

<div class="login-container">
  <h2>Login</h2>
  <form>
    <div class="input-box">
      <input type="text" placeholder="Username" required>
    </div>
    <div class="input-box">
      <input type="password" placeholder="Password" required>
    </div>
    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>
