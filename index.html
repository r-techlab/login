<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
}

.message {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="loginid" placeholder="Login Id">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="message" id="msg"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx8Rs91T39zDZYzvNXu5L50wo8vnfyrbSakvwXZD4u672q3AvgoxrcweRYksN0anJo/exec";

function login() {
    let loginid = document.getElementById("loginid").value;
    let password = document.getElementById("password").value;

    document.getElementById("msg").innerText = "Loading...";

    // JSONP approach to avoid CORS issue
    let script = document.createElement("script");
    script.src = `${API_URL}?loginid=${loginid}&password=${password}&callback=handleResponse`;
    document.body.appendChild(script);
}

// This function will be called by Google Script
function handleResponse(response) {
    if (response.status === "success") {
        alert("Login Successful ✅");
        document.getElementById("msg").innerText = "Welcome!";
        document.getElementById("msg").style.color = "green";
    } else {
        alert("Login Failed ❌");
        document.getElementById("msg").innerText = response.message;
        document.getElementById("msg").style.color = "red";
    }
}
</script>

</body>
</html>
